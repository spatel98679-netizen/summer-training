<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
    <link rel="stylesheet" href="./assets/css/login.css">
</head>
<body>
    <main class="login-form-container">
    <section class="form-left-container">
        <div class="form-logo">
            <!-- logo -->
            <img src="./assets/images/logo.png" alt="logo">
        </div>
        <div class="form-heading">
            <!-- heading -->
             <h1>modern login page</h1>
        </div>
        <div class="form-description">
            <!-- description -->
             <article>this is our login page which is experienced based</article>
        </div>
    </section>
    <section class="form-right-container">
        <div class="form-right-heading">
            <h2>Sign Up</h2>
        </div>
        <section>
            <form class="form">
                <div class="name-input">
                    <input type="text"placeholder="First Name">
                    <input type="text"placeholder="Last Name">
                </div>
                <input type="text"placeholder="Enter Name">
                <input type="text"placeholder="Enter Mail">
                <input type="text"placeholder="Enter password">
                <input type="text"placeholder="Enter phone No">
                <div class="terms-check-box">
                    <input type="checkbox">
                    <span>agreed to terms and condition</span>
                </div>
                <button type="submit">Submit</button>
            </form>
        </section>
        <div class="form-right-description">
            <span>alreay as a member</span>
            <a href="/login">Login</a>
        </div>
    </section>
    </main>
</body>
